name: Habits
options:
  bundleIdPrefix: com.albertc.habit
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YH4QJW8XNH
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift.git
    exactVersion: 2.45.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS.git
    exactVersion: 9.1.0

targets:
  Habits:
    type: application
    platform: iOS
    sources:
      - Habits
    info:
      path: Habits/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.albertc.habit
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.94500561889-nipnafo2ubg1td8icodvrnmltius33ud
        ITSAppUsesNonExemptEncryption: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit
        PRODUCT_NAME: Habits
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Habits/Habits.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: HabitsWidgetExtension
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

  HabitsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HabitsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: Habits

  HabitsMac:
    type: application
    platform: macOS
    sources:
      - path: Habits
        excludes:
          - Info.plist
    info:
      path: HabitsMac/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - com.albertc.habit
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.94500561889-nipnafo2ubg1td8icodvrnmltius33ud
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.mac
        PRODUCT_NAME: "Habits & Things"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: HabitsMac/HabitsMac.entitlements
    dependencies:
      - package: Supabase
        product: Supabase
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

  HabitsMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - HabitsMacTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.mac.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Habits.app/Contents/MacOS/Habits"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: HabitsMac

  HabitsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HabitsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.uitests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: Habits

  HabitsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - HabitsWidget
      - Habits/Shared
    info:
      path: HabitsWidget/Info.plist
      properties:
        CFBundleDisplayName: HabitsWidget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.widget
        PRODUCT_NAME: HabitsWidgetExtension
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: HabitsWidget/HabitsWidgetExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  Habits:
    build:
      targets:
        Habits: all
        HabitsTests: [test]
        HabitsUITests: [test]
    test:
      config: Debug
      targets:
        - HabitsTests
        - HabitsUITests
    run:
      config: Debug
      executable: Habits
    profile:
      config: Release
      executable: Habits
    analyze:
      config: Debug
    archive:
      config: Release

  HabitsMac:
    build:
      targets:
        HabitsMac: all
        HabitsMacTests: [test]
    test:
      config: Debug
      targets:
        - HabitsMacTests
    run:
      config: Debug
      executable: HabitsMac
    profile:
      config: Release
      executable: HabitsMac
    analyze:
      config: Debug
    archive:
      config: Release

  HabitsWidgetSmall:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsSmallWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsSmallWidget
    analyze:
      config: Debug
    archive:
      config: Release

  ThingsWidgetSmall:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: ThingsSmallWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: ThingsSmallWidget
    analyze:
      config: Debug
    archive:
      config: Release

  HabitsWidgetLockScreen:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsLockScreenWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsLockScreenWidget
    analyze:
      config: Debug
    archive:
      config: Release

  AddThingWidgetLockScreen:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: AddThingLockScreenWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: AddThingLockScreenWidget
    analyze:
      config: Debug
    archive:
      config: Release
