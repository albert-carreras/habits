name: Habits
options:
  bundleIdPrefix: com.albertc.habit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YH4QJW8XNH
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "2"

targets:
  Habits:
    type: application
    platform: iOS
    sources:
      - Habits
    info:
      path: Habits/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit
        PRODUCT_NAME: Habits
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_ENTITLEMENTS: Habits/Habits.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: HabitsWidgetExtension

  HabitsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HabitsTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.tests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: Habits

  HabitsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HabitsUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.uitests
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: Habits

  HabitsWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - HabitsWidget
      - Habits/Shared
    info:
      path: HabitsWidget/Info.plist
      properties:
        CFBundleDisplayName: HabitsWidget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.albertc.habit.widget
        PRODUCT_NAME: HabitsWidgetExtension
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: HabitsWidget/HabitsWidgetExtension.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"

schemes:
  Habits:
    build:
      targets:
        Habits: all
        HabitsTests: [test]
        HabitsUITests: [test]
    test:
      config: Debug
      targets:
        - HabitsTests
        - HabitsUITests
    run:
      config: Debug
      executable: Habits
    profile:
      config: Release
      executable: Habits
    analyze:
      config: Debug
    archive:
      config: Release

  HabitsWidgetSmall:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsSmallWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsSmallWidget
    analyze:
      config: Debug
    archive:
      config: Release

  HabitsWidgetMedium:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsMediumWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsMediumWidget
    analyze:
      config: Debug
    archive:
      config: Release

  HabitsWidgetLockScreen:
    build:
      targets:
        HabitsWidgetExtension: all
    run:
      config: Debug
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsLockScreenWidget
    profile:
      config: Release
      executable: HabitsWidgetExtension
      environmentVariables:
        _XCWidgetKind: HabitsLockScreenWidget
    analyze:
      config: Debug
    archive:
      config: Release
