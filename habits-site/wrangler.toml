name = "habits-site"
main = "worker.js"
compatibility_date = "2024-01-01"

routes = [
  { pattern = "habits.bored.cat", custom_domain = true }
]

[[r2_buckets]]
binding = "DOWNLOADS"
bucket_name = "habits-downloads"

[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.png"]
fallthrough = true

[build]
command = "node scripts/prepare-release.mjs"
